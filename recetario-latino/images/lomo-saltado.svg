  <rect x="200" y="195" width="40" height="14" rx="4" fill="#a0522d" transform="rotate(8 200 195)"/>
  <rect x="180" y="205" width="40" height="14" rx="4" fill="#8b3a1f" transform="rotate(-5 180 205)"/>
