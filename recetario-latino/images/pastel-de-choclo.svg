<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff3e0"/>
  <!-- Baking dish -->
  <rect x="70" y="150" width="260" height="80" rx="10" fill="#cfcfcf"/>
  <rect x="80" y="160" width="240" height="60" rx="6" fill="#a0522d"/>
  <!-- Corn topping layer -->
  <rect x="80" y="140" width="240" height="30" rx="6" fill="#f4c542"/>
  <!-- Sugar crust speckles -->
  <circle cx="110" cy="148" r="2" fill="#fff3d0"/>
  <circle cx="140" cy="152" r="2" fill="#fff3d0"/>
  <circle cx="175" cy="146" r="2" fill="#fff3d0"/>
  <circle cx="210" cy="150" r="2" fill="#fff3d0"/>
  <circle cx="245" cy="147" r="2" fill="#fff3d0"/>
  <circle cx="280" cy="151" r="2" fill="#fff3d0"/>
  <!-- egg slice visible on side -->
  <circle cx="120" cy="195" r="12" fill="#fdfaf3"/>
  <circle cx="120" cy="195" r="5" fill="#f4c542"/>
  <!-- olive -->
  <ellipse cx="200" cy="195" rx="8" ry="6" fill="#3a2618"/>
  <!-- chicken piece -->
  <ellipse cx="270" cy="195" rx="20" ry="12" fill="#e8c39a"/>
</svg>
