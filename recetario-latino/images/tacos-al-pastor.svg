<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff3e0"/>
  <!-- Plate -->
  <ellipse cx="200" cy="220" rx="160" ry="40" fill="#e0e0e0"/>
  <!-- Taco shell 1 -->
  <path d="M 100 200 Q 100 130 180 130 Q 180 200 100 200 Z" fill="#f4c542"/>
  <path d="M 100 200 Q 100 130 180 130" stroke="#d9a82a" stroke-width="3" fill="none"/>
  <!-- Filling -->
  <ellipse cx="140" cy="160" rx="30" ry="12" fill="#a0522d"/>
  <circle cx="125" cy="155" r="5" fill="#f4a259"/>
  <circle cx="150" cy="158" r="5" fill="#f4a259"/>
  <circle cx="135" cy="165" r="4" fill="#2f9e44"/>
  <circle cx="155" cy="148" r="4" fill="#2f9e44"/>
  <!-- Taco shell 2 -->
  <path d="M 220 200 Q 220 130 300 130 Q 300 200 220 200 Z" fill="#f4c542"/>
  <path d="M 220 200 Q 220 130 300 130" stroke="#d9a82a" stroke-width="3" fill="none"/>
  <!-- Filling -->
  <ellipse cx="260" cy="160" rx="30" ry="12" fill="#a0522d"/>
  <circle cx="245" cy="155" r="5" fill="#f4a259"/>
  <circle cx="270" cy="158" r="5" fill="#f4a259"/>
  <circle cx="255" cy="165" r="4" fill="#2f9e44"/>
  <circle cx="275" cy="148" r="4" fill="#2f9e44"/>
  <!-- Lime wedge -->
  <path d="M 320 220 A 20 20 0 0 1 340 200 L 340 220 Z" fill="#a8d840"/>
  <path d="M 320 220 A 20 20 0 0 1 340 200" stroke="#7ba82c" stroke-width="2" fill="none"/>
</svg>
