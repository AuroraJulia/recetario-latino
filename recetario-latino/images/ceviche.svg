<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff3e0"/>
  <!-- Bowl -->
  <ellipse cx="200" cy="200" rx="140" ry="55" fill="#cfe8f0"/>
  <ellipse cx="200" cy="190" rx="125" ry="46" fill="#e8f4f8"/>
  <!-- Fish cubes -->
  <rect x="150" y="170" width="22" height="22" rx="3" fill="#fdfaf3" transform="rotate(10 150 170)"/>
  <rect x="190" y="180" width="22" height="22" rx="3" fill="#fdfaf3" transform="rotate(-8 190 180)"/>
  <rect x="225" y="165" width="22" height="22" rx="3" fill="#fdfaf3" transform="rotate(15 225 165)"/>
  <rect x="170" y="195" width="22" height="22" rx="3" fill="#fdfaf3" transform="rotate(-5 170 195)"/>
  <!-- onion slices -->
  <ellipse cx="240" cy="195" rx="18" ry="8" fill="#e89ad0" opacity="0.8" transform="rotate(20 240 195)"/>
  <ellipse cx="160" cy="210" rx="18" ry="8" fill="#e89ad0" opacity="0.8" transform="rotate(-15 160 210)"/>
  <!-- cilantro -->
