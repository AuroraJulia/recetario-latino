<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff3e0"/>
  <!-- Plate -->
  <ellipse cx="200" cy="220" rx="160" ry="40" fill="#e0e0e0"/>
  <!-- Empanada whole, half-moon -->
  <path d="M 110 200 A 60 60 0 0 1 230 200 Z" fill="#f4d28a"/>
  <path d="M 110 200 Q 170 235 230 200" stroke="#d9a82a" stroke-width="4" fill="none"/>
  <line x1="130" y1="205" x2="138" y2="194" stroke="#d9a82a" stroke-width="2"/>
  <line x1="152" y1="213" x2="160" y2="200" stroke="#d9a82a" stroke-width="2"/>
  <line x1="174" y1="217" x2="182" y2="203" stroke="#d9a82a" stroke-width="2"/>
  <line x1="196" y1="213" x2="204" y2="200" stroke="#d9a82a" stroke-width="2"/>
  <!-- Cut empanada showing filling -->
  <path d="M 260 200 A 50 50 0 0 1 350 200 Z" fill="#f9e3a8"/>
  <path d="M 270 200 A 40 40 0 0 1 340 200 Z" fill="#a0522d"/>
  <!-- egg slice -->
  <circle cx="295" cy="190" r="8" fill="#fdfaf3"/>
  <circle cx="295" cy="190" r="3" fill="#f4c542"/>
  <!-- olive -->
  <ellipse cx="315" cy="195" rx="6" ry="5" fill="#3a2618"/>
</svg>
