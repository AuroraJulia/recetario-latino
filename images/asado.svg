<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff3e0"/>
  <!-- Grill grates -->
  <rect x="50" y="170" width="300" height="60" fill="#3a2618" rx="6"/>
  <line x1="60" y1="175" x2="60" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="100" y1="175" x2="100" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="140" y1="175" x2="140" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="180" y1="175" x2="180" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="220" y1="175" x2="220" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="260" y1="175" x2="260" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="300" y1="175" x2="300" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <line x1="340" y1="175" x2="340" y2="225" stroke="#5a3c28" stroke-width="6"/>
  <!-- Ribs -->
  <rect x="75" y="180" width="100" height="20" rx="6" fill="#a0522d"/>
  <rect x="75" y="200" width="100" height="20" rx="6" fill="#8b3a1f"/>
  <!-- Sausages -->
  <ellipse cx="260" cy="190" rx="15" ry="40" fill="#c9603a" transform="rotate(20 260 190)"/>
  <ellipse cx="300" cy="190" rx="15" ry="40" fill="#c9603a" transform="rotate(20 300 190)"/>
  <!-- Fire glow -->
  <ellipse cx="200" cy="245" rx="120" ry="15" fill="#f4a259" opacity="0.5"/>
</svg>
